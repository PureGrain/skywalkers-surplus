<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skywalker's Surplus — Coming Soon</title>
  <meta name="robots" content="noindex, nofollow, noarchive, nositelinkssearchbox, nosnippet" />
  <meta name="description" content="Coming soon." />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <style>
    :root {
      --bg:     #000008;
      --panel:  #0b0b1f;
      --line:   #1e2044;
      --text:   #e8e4c8;
      --muted:  #6878a0;
      --accent: #ef6008;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── Starfield ── */
    #starfield {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 10;
      background: rgba(11,11,31,.85);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(6px);
      padding: 14px 24px;
    }
    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-logo { height: 44px; width: auto; display: block; }
    .header-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: .02em;
    }
    .header-sub {
      font-size: .75rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── Main ── */
    main {
      flex: 1;
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      text-align: center;
    }

    .eyebrow {
      font-size: .8rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .coming-soon {
      font-size: clamp(3.2rem, 12vw, 8rem);
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
      line-height: 1;
      color: var(--accent);
      text-shadow:
        0 0 40px rgba(239,96,8,.55),
        0 0 80px rgba(239,96,8,.25),
        0 0 120px rgba(239,96,8,.12);
      animation: pulse 3.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { text-shadow: 0 0 40px rgba(239,96,8,.55), 0 0 80px rgba(239,96,8,.25), 0 0 120px rgba(239,96,8,.12); }
      50%       { text-shadow: 0 0 60px rgba(239,96,8,.8),  0 0 120px rgba(239,96,8,.4),  0 0 180px rgba(239,96,8,.2); }
    }

    .tagline {
      margin-top: 28px;
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.6;
      max-width: 440px;
    }

    .signal {
      display: flex;
      align-items: flex-end;
      gap: 5px;
      justify-content: center;
      margin-top: 40px;
      height: 28px;
    }
    .signal-bar {
      width: 6px;
      background: var(--accent);
      border-radius: 3px 3px 0 0;
      opacity: .25;
      animation: signal-blink 1.4s ease-in-out infinite;
    }
    .signal-bar:nth-child(1) { height: 8px;  animation-delay: 0s; }
    .signal-bar:nth-child(2) { height: 14px; animation-delay: .15s; }
    .signal-bar:nth-child(3) { height: 20px; animation-delay: .3s; }
    .signal-bar:nth-child(4) { height: 26px; animation-delay: .45s; }
    .signal-bar:nth-child(5) { height: 20px; animation-delay: .6s; }
    .signal-bar:nth-child(6) { height: 14px; animation-delay: .75s; }
    .signal-bar:nth-child(7) { height: 8px;  animation-delay: .9s; }

    @keyframes signal-blink {
      0%, 100% { opacity: .2; }
      50%       { opacity: 1; }
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 10;
      background: rgba(11,11,31,.85);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(6px);
      padding: 20px 24px;
    }
    .footer-inner {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .footer-logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .footer-favicon { width: 24px; height: 24px; border-radius: 4px; }
    .footer-brand { font-size: .88rem; font-weight: 600; color: var(--text); }
    .footer-location { font-size: .78rem; color: var(--muted); }
    .footer-copy { font-size: .75rem; color: var(--line); margin-top: 4px; }
  </style>
</head>
<body>

<canvas id="starfield"></canvas>

<header>
  <div class="header-inner">
    <img src="/skywalker_surplus_new_radio.png" class="header-logo" alt="Skywalker's Surplus" />
    <div>
      <div class="header-name">Skywalker's Surplus</div>
      <div class="header-sub">CB &amp; Ham Radio Gear — Louisville, KY</div>
    </div>
  </div>
</header>

<main>
  <div class="eyebrow">📡 Transmission incoming</div>
  <div class="coming-soon">Coming Soon</div>
  <p class="tagline">CB and ham radio gear from one man's obsession.<br>Louisville, KY. Private collection. By invite only.</p>
  <div class="signal">
    <div class="signal-bar"></div>
    <div class="signal-bar"></div>
    <div class="signal-bar"></div>
    <div class="signal-bar"></div>
    <div class="signal-bar"></div>
    <div class="signal-bar"></div>
    <div class="signal-bar"></div>
  </div>
</main>

<footer>
  <div class="footer-inner">
    <div class="footer-logo-row">
      <img src="/favicon-512.png" class="footer-favicon" alt="" />
      <span class="footer-brand">Skywalker's Surplus</span>
    </div>
    <div class="footer-location">CB &amp; Ham Radio Gear &mdash; Louisville, KY</div>
    <div class="footer-copy">&copy; <span id="yr"></span> Skywalker's Surplus. All rights reserved.</div>
  </div>
</footer>

<script>
document.getElementById('yr').textContent = new Date().getFullYear();

// Starfield
(function () {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  const stars = Array.from({ length: 280 }, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.3 + 0.2,
    o: Math.random() * 0.65 + 0.2,
    speed: Math.random() * 0.4 + 0.1,
    phase: Math.random() * Math.PI * 2,
  }));

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const twinkle = s.o * (0.6 + 0.4 * Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(232,228,200,${twinkle})`;
      ctx.fill();
    });
    t += 0.016;
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

</body>
</html>
