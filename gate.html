<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skywalker's Surplus — Verifying…</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <style>
    :root { --bg: #000008; --panel: #0b0b1f; --line: #1e2044; --text: #e8e4c8; --muted: #6878a0; --accent: #ef6008; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: var(--panel); border-bottom: 1px solid var(--line); padding: 12px 20px; }
    .header-inner { max-width: 860px; margin: 0 auto; }
    .header-logo { height: 44px; width: auto; display: block; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .box { max-width: 380px; width: 100%; text-align: center; }
    h1 { font-size: 1.25rem; color: var(--text); margin-bottom: 8px; }
    p { color: var(--muted); line-height: 1.6; font-size: .9rem; margin-bottom: 24px; }
    .error { color: #f87171; font-size: .85rem; margin-bottom: 16px; }
    #ts-wrap { display: flex; justify-content: center; }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="/"><img src="/skywalker_surplus_new_radio.png" class="header-logo" alt="Skywalker's Surplus" /></a>
  </div>
</header>
<main>
  <div class="box">
    <h1>One quick check</h1>
    <p>Confirming you're human before letting you in.</p>
    <div id="error-msg" class="error" hidden></div>
    <form id="gate-form" method="POST" action="/api/gate-verify">
      <input type="hidden" id="f-next" name="next" value="/" />
      <input type="hidden" id="f-token" name="token" value="" />
      <div id="ts-wrap">
        <div id="ts-widget"></div>
      </div>
    </form>
  </div>
</main>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad" defer></script>
<script>
(function () {
  var params = new URLSearchParams(location.search);
  var next = params.get('next') || '/';
  if (!next.startsWith('/') || next.startsWith('//')) next = '/';
  document.getElementById('f-next').value = next;

  if (params.get('error')) {
    var el = document.getElementById('error-msg');
    el.textContent = 'Verification failed. Please try again.';
    el.hidden = false;
  }

  window.onTurnstileLoad = function () {
    turnstile.render('#ts-widget', {
      sitekey: '0x4AAAAAADitDbFAT7vgfMbe',
      callback: function (token) {
        document.getElementById('f-token').value = token;
        document.getElementById('gate-form').submit();
      },
    });
  };
})();
</script>
</body>
</html>
